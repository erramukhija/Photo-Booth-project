<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Clicker+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body class="home-active">
    <div id="app">
        <!-- View: Home -->
        <section id="view-home" class="view active">
            <h1 class="logo glow">Photobooth</h1>
            <div class="actions">
                <button id="btn-open-camera" class="btn primary home-btn">
                    open camera
                </button>
                    <div class="divider">or</div>
                <label for="upload-input" class="btn secondary upload-btn home-btn" id="btn-upload">
                    upload photos
                </label>
                <input type="file" id="upload-input" accept="image/*" multiple hidden>
            </div>
        </section>

        <!-- View: Camera -->
        <section id="view-camera" class="view">
            <div class="camera-header">
                <h2 class="camera-title">Strike a pose!</h2>
            </div>
            <div class="camera-container">
                <video id="video-feed" autoplay playsinline></video>
                <p class="camera-status" id="camera-status">Ready for 3 shots</p>
                <div id="countdown-overlay" class="countdown hidden">3</div>
                <div id="flash-overlay" class="flash hidden"></div>

                <div class="camera-ui">
                    <button id="btn-capture" class="btn primary capture-trigger">
                        <div class="capture-inner"></div>
                    </button>
                    <button class="btn text-btn btn-back">Cancel</button>
                </div>
            </div>
        </section>

        <!-- View: Customize Color -->
        <section id="view-customize" class="view">
            <div class="customize-layout">
                <div class="preview-panel" id="color-preview-panel">
                    <div id="strip-preview" class="photostrip bg-white">
                        <div class="photos-container" id="strip-photos">
                            <!-- Image previews will be injected here -->
                        </div>
                        <div class="strip-note" id="strip-note-display"></div>
                    </div>
                </div>

                <div class="controls-panel glass-panel">
                    <h2>Select Strip Color</h2>

                    <div class="control-group">
                        <div class="color-options">
                            <button class="color-btn bg-pink" data-color="pink" aria-label="Pink"></button>
                            <button class="color-btn bg-white active" data-color="white" aria-label="White"></button>
                            <button class="color-btn bg-yellow" data-color="yellow" aria-label="Yellow"></button>
                        </div>
                    </div>

                    <div class="control-actions">
                        <button id="btn-next-to-note" class="btn primary full-width next-btn">next ➔</button>
                        <button class="btn text-btn btn-back-home w-full mt-2">start over</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- View: Add Note -->
        <section id="view-add-note" class="view">
            <div class="customize-layout">
                <div class="preview-panel" id="note-preview-panel">
                    <!-- strip-preview will be moved here via JS -->
                </div>

                <div class="controls-panel glass-panel">
                    <h2>Add a Note</h2>

                    <div class="control-group">
                        <textarea id="note-input" class="modern-input" placeholder="e.g. Best Day Ever!"
                            maxlength="30" rows="3"></textarea>
                    </div>

                    <div class="control-actions">
                        <button id="btn-finish" class="btn primary full-width next-btn">next ➔</button>
                        <button class="btn text-btn btn-back-home w-full mt-2">start over</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- View: Result -->
        <section id="view-result" class="view">
            <div class="result-container">
                <div class="final-strip-wrapper" id="final-strip-wrapper">
                    <!-- Cloned strip will be placed here -->
                </div>

                <div class="result-actions">
                    <button id="btn-download" class="btn primary">
                        <svg viewBox="0 0 24 24" fill="none" class="icon">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <polyline points="7 10 12 15 17 10" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        Save Photo
                    </button>
                    <button class="btn secondary btn-back-home">Take Another</button>
                </div>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="script.js?v=2"></script>
</body>

</html>
